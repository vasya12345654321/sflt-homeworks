frontend http_front
    bind *:8080
    mode http

    acl host_example hdr(host) -i example.local example.local:8080
    use_backend example_backend if host_example

backend example_backend
    mode http
    balance roundrobin

    server s1 127.0.0.1:8001 weight 2 check
    server s2 127.0.0.1:8002 weight 3 check
    server s3 127.0.0.1:8003 weight 4 check
